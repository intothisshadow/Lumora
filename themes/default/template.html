<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="{CHARSET}">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{PAGE_TITLE}{GALLERY_NAME}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/photoswipe@5.4.4/dist/photoswipe.css">
  <link rel="stylesheet" href="{THEME_URL}lumora.css">
</head>
<body class="lum-body">

  <!-- ── Navbar ────────────────────────────────────────────────────────────── -->
  <nav class="navbar navbar-expand-lg lum-navbar">
    <div class="container-xl">
      <a class="navbar-brand lum-brand" href="{BASE_URL}">{GALLERY_NAME}</a>
      <button class="navbar-toggler" type="button"
              data-bs-toggle="collapse" data-bs-target="#lum-nav"
              aria-controls="lum-nav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="lum-nav">
        {NAVIGATION}
        <div class="d-flex align-items-center gap-2">
          {ADMIN_LINK}
        </div>
      </div>
    </div>
  </nav>

  {CUSTOM_HEADER}

  <!-- ── Main content ──────────────────────────────────────────────────────── -->
  <main class="lum-main container-xl py-3 py-md-4">
    {CONTENT}
  </main>

  {CUSTOM_FOOTER}

  <!-- ── Footer ────────────────────────────────────────────────────────────── -->
  <footer class="lum-footer text-center py-3">
    <small class="text-muted">Powered by <a href="https://code.unloved-heart.net/lumora" rel="noopener">Lumora Gallery</a> {LUMORA_VERSION}</small>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
